<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR Object Scanner</title>
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="ar-panel">
    <video id="camera" autoplay playsinline></video>

    <div id="mode-bar">
      <button data-mode="general">General</button>
      <button data-mode="plant">Plant</button>
      <button data-mode="food">Food</button>
    </div>

    <div id="card"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
